interface:
  display_name: "网页脚本分析"
  short_description: "网页接口捕获与脚本化数据分析"
  default_prompt: "Use $web-script-analysis to open a target web page, inspect page scripts and network APIs, then analyze data through stable interfaces. For ERP scenes under *.vsigo.cn excluding yuce.vsigo.cn, default to environment-variable API login before manual browser login: read references/vsigo-erp-login.md, check ERP_USER/ERP_PASSWORD or TMALL_DAILY_ERP_USER/TMALL_DAILY_ERP_PASSWORD, run `python scripts/vsigo_erp_login.py --business-id sigo`, and when a browser session is required run `python scripts/vsigo_erp_login.py --business-id sigo --port <cdp-port> --inject-browser-state`. If credentials are missing, do not silently choose manual login: ask the user to choose between setting ERP environment variables now (Recommended, show macOS/Linux, macOS launchd, and Windows PowerShell commands from scripts/self_check.py or references/vsigo-erp-login.md) or manual browser login for this run only. Use manual login only if the user chooses it, the helper fails, CAPTCHA/MFA/device trust/password change appears, or the user explicitly asks for manual login."

policy:
  allow_implicit_invocation: true
